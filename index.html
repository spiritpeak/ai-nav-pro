            { id: 'all', name: '全部', icon: 'fa-grid-2' },
            { id: 'llm', name: '大语言模型', icon: 'fa-message' },
            { id: 'image', name: '图像生成', icon: 'fa-paintbrush' },
            { id: 'code', name: '编程开发', icon: 'fa-code' },
            { id: 'audio', name: '语音音频', icon: 'fa-microphone-lines' },
            { id: 'video', name: '视频制作', icon: 'fa-video' },
            { id: 'productivity', name: '办公效率', icon: 'fa-briefcase' },
            { id: 'writing', name: '写作助手', icon: 'fa-pen-nib' },
            { id: '3d', name: '3D 设计', icon: 'fa-cube' },
            { id: 'research', name: '科研学术', icon: 'fa-flask' }
        ];

        function renderCategoryNav() {
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = categories.map(cat => 
                `<button class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-colors whitespace-nowrap ${cat.id === 'all' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-100 border dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700'}" data-category="${cat.id}">
                    <i class="fa-solid ${cat.icon} mr-1"></i>${cat.name}
                </button>`
            ).join('');
        }

        function renderTools() {
            const container = document.getElementById('toolsContainer');
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = toolsData.filter(t => {
                const matchesSearch = t.name.toLowerCase().includes(query) || t.desc.toLowerCase().includes(query);
                const matchesCategory = currentCategory === 'all' || t.category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            document.getElementById('totalCount').textContent = toolsData.length;
            container.innerHTML = filtered.map(t => `
                <div class="card-bg bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover flex flex-col h-full cursor-pointer dark:bg-gray-800 dark:border-gray-700" onclick="window.open('${t.url}', '_blank')">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-12 h-12 ${t.bg} ${t.color} rounded-xl flex items-center justify-center text-2xl hover:scale-110 transition-transform dark:bg-opacity-20">
                            <i class="fa-solid ${t.icon}"></i>
                        </div>
                        <i class="fa-solid fa-arrow-up-right-from-square text-gray-300 hover:text-blue-500"></i>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900 mb-2 hover:text-blue-600 dark:text-gray-100">${t.name}</h3>
                    <p class="text-gray-500 text-sm leading-relaxed flex-grow dark:text-gray-400">${t.desc}</p>
                    <div class="mt-4 pt-4 border-t border-gray-50 dark:border-gray-700">
                        <span class="text-xs font-medium px-2.5 py-1 rounded-md bg-gray-100 text-gray-600 capitalize dark:bg-gray-700 dark:text-gray-300">${t.category.toUpperCase()}</span>
                    </div>
                </div>
            `).join('');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderCategoryNav();
            renderTools();
            
            // 分类切换
            document.getElementById('categoryNav').addEventListener('click', (e) => {
                const btn = e.target.closest('.category-btn');
                if (!btn) return;
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-white', 'text-gray-600');
                });
                btn.classList.remove('bg-white', 'text-gray-600');
                btn.classList.add('bg-blue-600', 'text-white');
                currentCategory = btn.dataset.category;
                renderTools();
            });

            // 搜索
            document.getElementById('searchInput').addEventListener('input', renderTools);

            // 深色模式
            document.getElementById('themeToggle').addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
        });
    </script>
</body>
</html>
